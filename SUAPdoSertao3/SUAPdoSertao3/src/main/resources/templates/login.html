<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login - SUAPdoSertao</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4">SUAPdoSertao</h4>
                    <p class="text-center text-muted">Faça o login para continuar</p>

                    <div th:if="${alerta != null}"
                         th:class="${alerta == 'erro'} ? 'alert alert-danger' : 'alert alert-success'"
                         role="alert">
                        <strong th:text="${titulo}"></strong>
                        <p th:text="${texto}" class="mb-0"></p>
                        <small th:text="${subtexto}"></small>
                    </div>

                    <form method="post" th:action="@{/login}">
                        <div class="mb-3">
                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   placeholder="Email"
                                   required autofocus/>
                        </div>
                        <div class="mb-3">
                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Senha"
                                   required/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Entrar</button>
                        </div>
                    </form>

                </div>
            </div>
            <p class="text-center mt-3 text-muted small">
                SUAPdoSertao &copy; 2026 - Powered by IFPB - Campus Soledade
            </p>
        </div>
    </div>
</div>

</body>
</html>
