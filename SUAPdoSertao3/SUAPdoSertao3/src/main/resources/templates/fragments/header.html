<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<header th:fragment="cabecalho">

  <nav class="navbar navbar-dark bg-dark fixed-top px-3
              d-flex align-items-center justify-content-between">

    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-outline-secondary"
              type="button"
              id="sidebarToggleBtn">
        <span class="navbar-toggler-icon"></span>
      </button>
      <span class="navbar-brand mb-0 h6 text-white">
        SUAPdoSertaoWEB
      </span>
    </div>

    <form th:action="@{/logout}"
          method="post"
          class="d-flex align-items-center gap-2 m-0"
          sec:authorize="isAuthenticated()">

      <input type="hidden"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>

      <div class="btn-group">
        <button type="button" class="btn btn-sm btn-light d-flex align-items-center gap-1">
          <i class="bi bi-person"></i>
          <span sec:authentication="name"></span>
        </button>
        <button type="button"
                class="btn btn-sm btn-danger dropdown-toggle dropdown-toggle-split"
                data-bs-toggle="dropdown"
                aria-expanded="false">
        </button>
        <div class="dropdown-menu dropdown-menu-end">
          <button type="submit" class="dropdown-item text-danger fw-semibold">
            <i class="bi bi-box-arrow-right me-1"></i> Sair
          </button>
        </div>
      </div>

    </form>

    <a th:href="@{/login}"
       class="btn btn-sm btn-outline-light"
       sec:authorize="!isAuthenticated()">
      <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
    </a>

  </nav>

</header>
</html>
