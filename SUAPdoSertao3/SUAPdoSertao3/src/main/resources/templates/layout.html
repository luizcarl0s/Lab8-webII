<!DOCTYPE html>
<html lang="pt" xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>SUAPdoSertao</title>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- CSS próprio -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">

    <!-- Favicon -->
    <link rel="shortcut icon" th:href="@{/images/ifpb-1.png}" type="image/x-icon">
</head>

<body>

    <header th:replace="~{fragments/header :: cabecalho}">
        <div>header</div>
    </header>

    <div class="layout-main">
        <aside>
            <nav th:replace="~{fragments/sidebar :: nav-sidebar}">
                <span>menu</span>
            </nav>
        </aside>
        <section layout:fragment="corpo">
            <div>corpo</div>
        </section>
    </div>

    <footer th:replace="~{fragments/footer :: rodape}">
        <div>footer</div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.1/js/bootstrap.min.js"></script>

    <script type="text/javascript">
        var url = '';
        const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
        const popoverList = [...popoverTriggerList].map(popoverTriggerEl => new bootstrap.Popover(popoverTriggerEl));

        $('button[id*="btn_"]').click(function() {
            url = document.location.origin + "/" + $(this).attr('id').split("_")[1];
        });

        $('#ok_confirm').click(function() {
            document.location.href = url;
        });

        $(document).ready(function() {
            $('[data-toggle="popover"]').popover();
        });

        $(document).ready(function() {
            $(".navbar-toggle").click(function() {
                $(".sidebar").toggleClass("sidebar-open");
            });
        });
    </script>

</body>
</html>
